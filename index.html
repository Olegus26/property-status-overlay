<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Макет: Задаток і Продано</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .controls {
            margin-bottom: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
        }
        .control-label {
            display: flex;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        .control-label input {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #8b5cf6;
        }
        .image-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background-color: #000;
        }
        .main-img {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 0.3s ease;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6); /* Затемнення фото */
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-badge {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            transform: scale(0.5);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        
        /* Стани */
        .image-container.has-status .overlay {
            opacity: 1;
        }
        .image-container.has-status .status-badge {
            transform: scale(1);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label class="control-label">
            <input type="checkbox" id="check-zadatak">
            Задаток
        </label>
        <label class="control-label">
            <input type="checkbox" id="check-prodano">
            Продано
        </label>
    </div>

    <div class="image-container" id="img-container">
        <!-- Референсне фото нерухомості з Unsplash -->
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1600&auto=format&fit=crop" alt="Real Estate" class="main-img">
        <div class="overlay">
            <img src="" alt="Status" class="status-badge" id="status-img">
        </div>
    </div>

    <script>
        const checkZadatak = document.getElementById('check-zadatak');
        const checkProdano = document.getElementById('check-prodano');
        const imgContainer = document.getElementById('img-container');
        const statusImg = document.getElementById('status-img');

        checkZadatak.addEventListener('change', function() {
            if (this.checked) {
                checkProdano.checked = false;
                updateStatus('Завдаток.png');
            } else {
                updateStatus(null);
            }
        });

        checkProdano.addEventListener('change', function() {
            if (this.checked) {
                checkZadatak.checked = false;
                updateStatus('Продано.png');
            } else {
                updateStatus(null);
            }
        });

        function updateStatus(imageSrc) {
            if (imageSrc) {
                statusImg.src = imageSrc;
                imgContainer.classList.add('has-status');
            } else {
                imgContainer.classList.remove('has-status');
            }
        }
    </script>
</body>
</html>
